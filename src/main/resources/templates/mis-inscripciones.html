<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Inscripciones</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <div class="nav">
        <h1>Mis Inscripciones</h1>
        <div>
            <a href="/cursos">Catalogo</a>
            <form method="post" action="/logout" style="display:inline; margin:0; padding:0; max-width:none;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Cerrar Sesion</button>
            </form>
        </div>
    </div>
    <div th:each="inscripcion : ${inscripciones}" class="card">
        <h3 th:text="${inscripcion.curso.nombre}"></h3>
        <p><strong>Categoria:</strong> <span th:text="${inscripcion.curso.categoria.nombre}"></span></p>
        <p><strong>Creditos:</strong> <span th:text="${inscripcion.curso.creditos}"></span></p>
        <p><strong>Fecha de inscripcion:</strong> <span th:text="${inscripcion.fechaInscripcion}"></span></p>
        <p><strong>Estado:</strong> <span th:text="${inscripcion.estado}"></span></p>
        <div th:if="${notasPorInscripcion != null and notasPorInscripcion[inscripcion.id] != null}">
            <p><strong>Nota:</strong>
                <span th:text="${notasPorInscripcion[inscripcion.id].valor}"
                      th:class="${notasPorInscripcion[inscripcion.id].valor >= 70 ? 'exito' : 'error'}">
                </span> / 100
            </p>
            <p th:if="${notasPorInscripcion[inscripcion.id].observacion != null}"
               th:text="'Observacion: ' + ${notasPorInscripcion[inscripcion.id].observacion}">
            </p>
        </div>
        <div th:unless="${notasPorInscripcion != null and notasPorInscripcion[inscripcion.id] != null}">
            <p><strong>Nota:</strong> <em>Pendiente de calificacion</em></p>
        </div>
        <form th:action="@{/inscripciones/cancelar/{id}(id=${inscripcion.id})}" method="post"
              style="margin-top:12px; max-width:none; padding:0;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" onclick="return confirm('Cancelar esta inscripcion?')">
                Cancelar inscripcion
            </button>
        </form>
    </div>
    <div th:if="${#lists.isEmpty(inscripciones)}">
        <p>No estas inscrito en ningun curso. <a href="/cursos">Ver catalogo</a></p>
    </div>
</div>
</body>
</html>
