<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Inscripciones</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <div class="nav">
        <h1>Mis Inscripciones</h1>
        <div>
            <a href="/cursos">Catalogo</a>
            <form method="post" action="/logout" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="background:none; border:none; color:#2E5FA3; cursor:pointer; font-size:14px; padding:0;">Cerrar Sesion</button>
            </form>
        </div>
    </div>
    <div th:each="inscripcion : ${inscripciones}" class="card">
        <h3 th:text="${inscripcion.curso.nombre}"></h3>
        <p><strong>Estado:</strong> <span th:text="${inscripcion.estado}"></span></p>
        <p><strong>Fecha:</strong> <span th:text="${inscripcion.fechaInscripcion}"></span></p>
        <form th:action="@{/inscripciones/cancelar/{id}(id=${inscripcion.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">Cancelar inscripcion</button>
        </form>
    </div>
    <div th:if="${#lists.isEmpty(inscripciones)}">
        <p>No estas inscrito en ningun curso. <a href="/cursos">Ver catalogo</a></p>
    </div>
</div>
</body>
</html>
