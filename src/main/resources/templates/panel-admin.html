<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrador</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <div class="nav">
        <h1>Panel del Profesor</h1>
        <div>
            <a href="/cursos">Catalogo</a>
            <form method="post" action="/logout" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="background:none; border:none; color:#2E5FA3; cursor:pointer; font-size:14px; padding:0;">Cerrar Sesion</button>
            </form>
        </div>
    </div>
    <a href="/admin/cursos/nuevo" class="btn-primary">+ Nuevo Curso</a>
    <br/><br/>
    <div th:each="curso : ${cursos}" class="card">
        <h3 th:text="${curso.nombre}"></h3>
        <p th:text="${curso.descripcion}"></p>
        <p><strong>Creditos:</strong> <span th:text="${curso.creditos}"></span></p>
        <p><strong>Estado:</strong>
            <span th:text="${curso.activo ? 'Activo' : 'Inactivo'}"></span>
        </p>
        <a th:href="@{/admin/cursos/{id}/estudiantes(id=${curso.id})}">Ver estudiantes</a>
        <form th:action="@{/admin/cursos/{id}/estado(id=${curso.id})}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="activo" th:value="${!curso.activo}"/>
            <button type="submit" th:text="${curso.activo ? 'Desactivar' : 'Activar'}"></button>
        </form>
    </div>
    <div th:if="${#lists.isEmpty(cursos)}">
        <p>No tienes cursos asignados aun.</p>
    </div>
</div>
</body>
</html>
