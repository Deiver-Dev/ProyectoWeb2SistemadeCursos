<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${curso != null ? curso.nombre : 'Curso'}">Detalle</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <div class="nav">
        <h1>Detalle del Curso</h1>
        <div>
            <a href="/cursos">Catalogo</a>
            <a sec:authorize="hasRole('ESTUDIANTE')" href="/inscripciones">Mis Inscripciones</a>
            <form method="post" action="/logout" style="display:inline; margin:0; padding:0; max-width:none;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Cerrar Sesion</button>
            </form>
        </div>
    </div>
    <div th:if="${curso != null}">
        <h2 th:text="${curso.nombre}"></h2>
        <p th:text="${curso.descripcion}"></p>
        <p><strong>Creditos:</strong> <span th:text="${curso.creditos}"></span></p>
        <p><strong>Categoria:</strong> <span th:text="${curso.categoria.nombre}"></span></p>
        <p><strong>Profesor:</strong>
            <span th:text="${curso.profesor != null ? curso.profesor.nombre : 'Por asignar'}"></span>
        </p>
        <div sec:authorize="hasRole('ESTUDIANTE')">
            <div th:if="${estaInscrito}">
                <p class="exito">Ya estas inscrito en este curso.</p>
            </div>
            <div th:unless="${estaInscrito}">
            <form class="inline-form"
                  th:action="@{/inscripciones/inscribir/{id}(id=${curso.id})}"
                  method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-primary">Inscribirme</button>
            </form>
        </div>
        </div>
    </div>
    <div th:if="${curso == null}">
        <p>Curso no encontrado.</p>
    </div>
</div>
</body>
</html>
