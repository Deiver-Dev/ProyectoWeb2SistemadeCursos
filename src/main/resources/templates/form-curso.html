<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Curso</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h1>Crear Nuevo Curso</h1>
    <form method="post" action="/admin/cursos/nuevo">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Nombre del curso:</label>
        <input type="text" name="nombre" required/>
        <label>Descripcion:</label>
        <textarea name="descripcion" rows="4"></textarea>
        <label>Creditos:</label>
        <input type="number" name="creditos" min="1" max="10" required/>
        <label>Categoria:</label>
        <select name="categoriaId">
            <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
        </select>
        <button type="submit" class="btn-primary">Guardar Curso</button>
        <a href="/admin">Cancelar</a>
    </form>
</div>
</body>
</html>
